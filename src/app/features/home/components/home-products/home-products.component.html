<section>
  <div class="container md:w-11/12 mx-auto">
    <!-- header  -->
    <div class="flex items-center gap-3 my-8">
      <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
      <h2 class="text-2xl md:text-3xl font-bold text-gray-800">
        Featured <span class="text-emerald-600">Products</span>
      </h2>
    </div>
    <div class="grid mt-5 gap-7 grid-cols-1 md:grid-cols-3 lg:grid-cols-5">
      @for (product of productList(); track product._id) {
        <div
          class="bg-white border hover:-translate-y-5 cursor-pointer border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all duration-300 group font-sans"
        >
          <div class="relative overflow-hidden mb-4">
            <img
              [src]="product.imageCover"
              [alt]="product.title"
              class="w-full h-auto object-contain"
            />

            <!--  ! ----------- Icons  Heart ! ----------- ....  -->
            <div class="absolute top-2 right-2 flex flex-col gap-2">
              <button
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="far fa-heart"></i>
              </button>

              <button
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="fas fa-sync-alt"></i>
              </button>

              <button
                [routerLink]="['/details', product._id, product.slug]"
                class="w-10 cursor-pointer h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-emerald-600 hover:text-white transition-all"
              >
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="space-y-1">
            <p class="text-xs text-gray-400 tracking-wide">{{ product.category.name }}</p>

            <h3
              class="text-lg font-medium text-slate-800 hover:text-emerald-600 cursor-pointer transition-colors"
            >
              {{ product.title.split(' ').splice(0, 4).join(' ') }}
            </h3>

            <div class="flex items-center gap-1">
              <div class="flex text-yellow-400 text-xs gap-0.5">
                @for (star of [1, 2, 3, 4, 5]; track star) {
                  <i
                    [class]="
                      star <= product.ratingsAverage
                        ? 'fas fa-star text-yellow-400'
                        : 'far fa-star text-gray-300'
                    "
                  ></i>
                }
              </div>
              <span class="text-xs text-gray-400 font-medium">
                {{ product.ratingsAverage }} ({{ product.ratingsQuantity }})</span
              >
            </div>

            <div class="flex items-center justify-between pt-2">
              <div class="flex flex-col">
                <span class="text-lg font-medium text-slate-900"> {{ product.price }} EGP</span>
              </div>

              <button
                (click)="addProductToCart(product._id)"
                class="w-10 h-10 bg-emerald-600 text-white rounded-lg flex cursor-pointer items-center justify-center hover:bg-emerald-700 transition-colors shadow-sm active:scale-95"
              >
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
